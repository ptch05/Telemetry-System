services:
  backend:
    build:
      context: ./backend
    environment:
      TELEMETRY_MODE: mock
      SAMPLE_HZ: 10
      RUN_DATA_DIR: /app/data/runs
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data/runs:/app/data/runs
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_TELEMETRY_WS_URL: ws://localhost:8000/ws/telemetry
      VITE_BACKEND_HTTP_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
